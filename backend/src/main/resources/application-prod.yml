server:
  port: 8088
  servlet:
    context-path: /api

spring:
  application:
    name: small-parts-inventory

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/inventory_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: inventory
    password: ${SPRING_DATASOURCE_PASSWORD:InventoryProdPass@2024}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000

  data:
    redis:
      host: redis
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.inventory.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.inventory: INFO
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
