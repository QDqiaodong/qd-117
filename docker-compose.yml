services:
  mysql:
    image: ${DOCKER_REGISTRY}mysql:8.0
    container_name: ${PROJECT_NAME}-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:${MYSQL_PORT}:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - inventory-network

  redis:
    image: ${DOCKER_REGISTRY}redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - inventory-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
    container_name: ${PROJECT_NAME}-backend
    restart: always
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8088"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8088
      SERVER_ADDRESS: 0.0.0.0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - ./data/flow:/app/data/flow
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8088/api/parts/page?pageNum=1\\&pageSize=1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - inventory-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
    container_name: ${PROJECT_NAME}-frontend
    restart: always
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:80/ | grep -q '<title>' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - inventory-network

networks:
  inventory-network:
    driver: bridge
